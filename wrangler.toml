name = "sentinel-api"
compatibility_date = "2026-05-13"
main = "src/index.ts"

[observability]
enabled = true

[assets]
directory = "dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "sentinel-db"
database_id = "d6775ac5-c4d4-426a-9a7a-39d18dc14b4e"

[ai]
binding = "AI"

[[ai_search]]
binding = "SEARCH"
instance_name = "nurse-clippy"

[[send_email]]
name = "EMAIL"

[vars]
ALLOWED_ORIGINS = "https://sentinel-api.kodakwest.workers.dev"
RATE_LIMIT_PER_HOUR = "100"
AUTH_EMAIL_FROM = "no-reply@logos-core.com"
# Required secret before deploy:
#   wrangler secret put SESSION_SECRET
# Optional secret (raises OpenFDA rate limits; app works without it):
#   wrangler secret put OPENFDA_API_KEY
